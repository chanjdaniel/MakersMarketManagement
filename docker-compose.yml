services:
  mongodb:
    image: mongo:7
    container_name: conventioner_mongodb
    restart: unless-stopped
    command: ["mongod", "--quiet", "--logpath", "/var/log/mongodb/mongod.log"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./back-end/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - conventioner_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: conventioner_backend
    restart: unless-stopped
    environment:
      - FLASK_APP=app.py
      # No FLASK_ENV: nothing reads it, and the last two things that did read `development` here on
      # every deployment built from this image. See back-end/Dockerfile.
      #
      # This compose file IS the local development stack, so it is where the escape hatch belongs:
      # the back end otherwise refuses to boot without a reCAPTCHA secret and a signing secret,
      # which a developer has no reason to hold. Nothing else in the repo sets this, so a deployment
      # built from the same image fails closed instead of silently serving the public signup
      # endpoint undefended.
      - ALLOW_INSECURE_LOCAL_DEV=true
      # Left empty on purpose: there is no fallback signing key anywhere in this repo, because a
      # committed one is a published one. Unset, the escape hatch above signs with a random key for
      # the life of the container - so a restart logs you out. Set SECRET_KEY to keep sessions.
      - SECRET_KEY=${SECRET_KEY:-}
      # Left empty on purpose: unset, the escape hatch above allows loopback origins on any port,
      # which is what the dev server and the e2e stack need (the Vite port moves per worktree).
      # A deployment has to name its front end's origin here - there is no wildcard.
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      # Stated rather than left to the escape hatch: this container has a disk, so it keeps sessions
      # on it. A serverless deployment has none and must set `null` - which is why there is no
      # default to inherit. See docs/RELEASING.md.
      - SESSION_TYPE=${SESSION_TYPE:-filesystem}
      # Stated for the same reason: nothing of ours sits in front of this container, so the peer
      # address IS the caller's and no forwarded header may be believed. A deployment behind an
      # ingress must say how many hops it owns (Vercel: 1), because that address is what organizer
      # signup reports to reCAPTCHA, and reCAPTCHA v3 scores on it.
      - TRUSTED_PROXY_HOPS=${TRUSTED_PROXY_HOPS:-0}
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=admin
      - MONGODB_PASSWORD=secret
      - MONGODB_DB=conventioner
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - FROM_EMAIL=${FROM_EMAIL:-onboarding@resend.dev}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
      - DISABLE_CAPTCHA=${DISABLE_CAPTCHA:-}
      - DISABLE_EMAIL=${DISABLE_EMAIL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "5000:5000"
    volumes:
      - ./back-end:/app
      - backend_sessions:/app/flask_session
      - backend_csv:/app/csv_exports
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - conventioner_network
    command: flask run --host=0.0.0.0 --port=5000 --cert=adhoc

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: conventioner_frontend
    restart: unless-stopped
    environment:
      - VITE_FLASK_HOST=/api
      - VITE_BACKEND_URL=https://backend:5000
      - VITE_RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY:-}
      # This stack is a local development one, and it says so - the same declaration the back end
      # makes with ALLOW_INSECURE_LOCAL_DEV. It is what lets the front end run with no reCAPTCHA
      # site key, sending a placeholder token that only a back end with DISABLE_CAPTCHA accepts.
      - VITE_ALLOW_INSECURE_LOCAL_DEV=true
    ports:
      - "5173:5173"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - conventioner_network

  mongo-express:
    image: mongo-express:latest
    container_name: conventioner_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=secret
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - conventioner_network

networks:
  conventioner_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  backend_sessions:
    driver: local
  backend_csv:
    driver: local
