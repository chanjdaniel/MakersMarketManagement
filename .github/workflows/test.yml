name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ -v

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  frontend-lint-and-types:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - name: Lint (full repo)
        run: npm run lint
      - name: Type-check (full repo)
        run: npm run type-check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker compose build

  e2e:
    runs-on: ubuntu-latest
    env:
      DISABLE_CAPTCHA: "true"
      DISABLE_EMAIL: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      # Install front-end deps on the host BEFORE `docker compose up`. Otherwise
      # Docker (as root) creates the anonymous-volume mountpoint `front-end/node_modules`
      # on the host bind mount root-owned, and the later `npm ci` fails with EACCES.
      - name: Install front-end dependencies
        working-directory: front-end
        run: npm ci
      - name: Install Playwright browsers
        working-directory: front-end
        run: npx playwright install chromium --with-deps
      - run: docker compose build
      - run: docker compose up -d
      - run: ./scripts/seed_fixture.sh
      - name: Run Playwright tests
        working-directory: front-end
        run: npx playwright test
      - name: Report flaky tests
        if: always()
        working-directory: front-end
        run: |
          if [ -f test-results/results.json ]; then
            FLAKY=$(jq -r '.stats.flaky // 0' test-results/results.json)
            PASSED=$(jq -r '.stats.expected // 0' test-results/results.json)
            FAILED=$(jq -r '.stats.unexpected // 0' test-results/results.json)
            {
              echo "### E2E Test Results"
              echo "| Outcome | Count |"
              echo "|---------|-------|"
              echo "| Passed  | $PASSED |"
              echo "| Failed  | $FAILED |"
              echo "| Flaky   | $FLAKY |"
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "$FLAKY" -gt 0 ]; then
              {
                echo ""
                echo ':warning: **'"$FLAKY"' test(s) passed only after retry.**'
                echo "These tests failed on their first attempt and recovered on a retry —"
                echo "a genuine intermittent failure, not a clean pass. Each flaky test is"
                echo "listed with its error in the Playwright run output above."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
      - name: Docker compose logs
        if: always()
        run: docker compose logs
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            front-end/playwright-report/
            front-end/test-results/
          retention-days: 7
