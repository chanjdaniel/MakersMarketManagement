name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  frontend-lint-and-types:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - name: Get changed front-end files
        id: changed
        run: |
          if git rev-parse origin/dev >/dev/null 2>&1; then
            BASE="origin/dev"
          else
            BASE="origin/main"
          fi
          FILES=$(git diff --name-only "$BASE"...HEAD -- '*.ts' '*.vue' '*.tsx' | sed 's|^front-end/||' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
      - name: Lint changed files
        if: steps.changed.outputs.files != ''
        run: npx eslint ${{ steps.changed.outputs.files }}
      - name: Type-check changed files
        if: steps.changed.outputs.files != ''
        run: npx vue-tsc --noEmit --project tsconfig.app.json

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
