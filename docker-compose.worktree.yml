# Per-worktree isolation overlay for treehouse worktrees.
#
# Applied ON TOP of a worktree's own docker-compose.yml so multiple worktrees
# can run the stack in parallel without colliding. It gives each worktree:
#   - a unique COMPOSE_PROJECT_NAME (isolates containers, networks, volumes)
#   - unique container_names
#   - offset host ports
#
# Driven exclusively by scripts/th-compose.sh, which exports COMPOSE_PROJECT_NAME
# and the TH_*_PORT variables. Do not use this file directly — the variables have
# no defaults on purpose, so a bare `docker compose -f ... -f this` would error.
#
# `!override` (Compose 2.24+) REPLACES the base port list instead of appending to
# it, so the base's fixed host ports don't leak through.

services:
  mongodb:
    container_name: ${COMPOSE_PROJECT_NAME}-mongodb
    ports: !override
      - "${TH_MONGO_PORT}:27017"

  backend:
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    ports: !override
      - "${TH_BACKEND_PORT}:5000"

  frontend:
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    ports: !override
      - "${TH_FRONTEND_PORT}:5173"

  mongo-express:
    container_name: ${COMPOSE_PROJECT_NAME}-mongo-express
    ports: !override
      - "${TH_MONGO_EXPRESS_PORT}:8081"
